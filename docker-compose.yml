version: '2.4'

services:
  cineboard:
    image: cineboard
    container_name: cineboard
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      TZ: "Australia/Brisbane"
      NODE_ENV: production
      BASEPATH: ""
      ET: "false"
    volumes:
      - ~/docker/cineboard/custom:/usr/src/app/public/custom
      - ~/docker/cineboard/config:/usr/src/app/config
    ports:
      - 9876:3000

